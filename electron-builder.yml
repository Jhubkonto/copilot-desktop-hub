appId: com.copilot-desktop-hub.app
productName: Copilot Desktop Hub
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
        - arm64
  icon: resources/icon.ico
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.developer-tools
linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icon.png
  category: Development
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
publish:
  provider: github
  owner: OWNER
  repo: copilot-desktop-hub
